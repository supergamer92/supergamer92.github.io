<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS RPG Engine - Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="ui-layer">
            <div id="hud">
                <div class="stat-box">HP: <span id="hp-val">100</span>/100</div>
                <div class="stat-box">Gold: <span id="gold-val">0</span></div>
            </div>

            <div id="dialogue-box" class="hidden">
                <p id="dialogue-text"></p>
                <div class="hint">Press 'E' to continue</div>
            </div>

            <div id="inventory" class="hidden">
                <h3>Inventory</h3>
                <ul id="item-list"></ul>
                <div class="hint">Press 'I' to close</div>
            </div>

            <div id="combat-overlay" class="hidden">
                <div id="combat-arena">
                    <div id="enemy-info">
                        <div id="enemy-name">SLIME BOSS</div>
                        <div class="hp-bar-bg"><div id="enemy-hp-bar"></div></div>
                        <div id="enemy-hp-text">50/50</div>
                    </div>
                    <div id="enemy-render">ENEMY</div>
                    <div id="combat-log">A wild Slime appears!</div>
                    <div id="combat-actions">
                        <button id="btn-attack" onclick="gameState.combat.playerAction('ATTACK')">Attack</button>
                        <button id="btn-defend" onclick="gameState.combat.playerAction('DEFEND')">Defend</button>
                        <button id="btn-heal" onclick="gameState.combat.playerAction('HEAL')">Heal</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
