<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="game-container">
    <canvas id="pong" width="800" height="500"></canvas>
    <div id="ui-layer" aria-hidden="true">
      <div id="scoreboard">
        <span id="player-score" class="score">0</span>
        <span class="score-separator">-</span>
        <span id="ai-score" class="score">0</span>
      </div>
      <div id="instructions">
        <p>Control left paddle: <strong>Mouse</strong> or <strong>W/S keys</strong></p>
        <p>First to 5 wins</p>
      </div>
      <button id="start-btn" class="button">Start Game</button>
      <button id="restart-btn" class="button hidden">Restart</button>
      <div id="message-area" class="message"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
