<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <h1>Super Cookie Clicker</h1>
        <div class="score-display">
            Cookies: <span id="cookie-count">0</span>
        </div>
        <div id="cookie" class="cookie"></div>
        
        <div class="upgrades-container">
            <h2>Upgrades</h2>
            <div class="upgrade-item">
                <button id="upgrade-clicker-btn">Buy Auto Clicker</button>
                <span class="upgrade-info">(<span id="auto-clicker-count">0</span>) - Cost: <span id="upgrade-clicker-cost">10</span> cookies</span>
            </div>
            <div class="upgrade-item">
                <button id="upgrade-grandma-btn">Buy Grandma</button>
                <span class="upgrade-info">(<span id="grandma-count">0</span>) - Cost: <span id="upgrade-grandma-cost">100</span> cookies</span>
            </div>
        </div>

        <div class="instructions-container">
            <p>Click the cookie to bake more cookies!</p>
            <p>Buy upgrades to automate your cookie production.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
